name: 2tierflasksqlapp

services:

   mysql:
      image: mysql:5.7
      container_name: mysql
      networks:
        - twotier
      volumes:
        - mysqldata:/var/lib/mysql
      ports:
        - "3306:3306"
      environment:
        - MYSQL_ROOT_PASSWORD=admin
        - MYSQL_USER=admin
        - MYSQL_PASSWORD=admin
        - MYSQL_DATABASE=tws_db 
      healthcheck:
          test: ["CMD","mysqladmin","ping","-h","localhost"]  
          interval: 10s
          timeout: 5s
          retries: 5

   flask:
      container_name: 2tierflasksqlapp

      build: .
     
      networks:
        - twotier
      ports:
        - "5000:5000"  
      environment:
        - MYSQL_HOST=mysql
        - MYSQL_USER=admin
        - MYSQL_PASSWORD=admin
        - MYSQL_DB=tws_db 
      depends_on: 
        - mysql    
      healthcheck:
        test: ["CMD","curl","-f","http://localhost:5000/health"]  
        interval: 30s
        timeout: 10s
        retries: 3


networks:
    twotier:

volumes:
    mysqldata:
       external: true

































