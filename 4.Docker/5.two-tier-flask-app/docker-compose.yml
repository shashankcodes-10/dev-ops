services:
    mysql:
      image: mysql:5.7

      container_name: mysql

      environment:
         MYSQL_ROOT_PASSWORD: admin
         MYSQL_USER: admin
         MYSQL_PASSWORD: admin
         MYSQL_DATABASE: tws_db 

      volumes:
        - mysqldb:/var/lib/mysql

      networks:
        - twotier

      ports: 
        - "3306:3306"    
      
      healthcheck:
        test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-padmin"]
        interval: 10s
        retries: 5
        start_period: 60s
        timeout: 5s

    flask-app:
     build: .
     image: 2flask-app
     container_name: 2flask-app
     environment:
         MYSQL_HOST: mysql
         MYSQL_USER: admin
         MYSQL_PASSWORD: admin
         MYSQL_DB: tws_db 
    
     networks:
        - twotier
     ports: 
        - "5000:5000" 
     depends_on:
       - mysql
     restart: always

networks:
   twotier:
       external: true

volumes:
  mysqldb:   
       external: true       




















































